http:
  routers:
    client:
      rule: "PathPrefix(`/`)"
      service: client
      entrypoints:
        - web
      tls: {}

    server:
      rule: "PathPrefix(`/api`)"
      service: server
      entrypoints:
        - web
      middlewares:
        - server-stripprefix
      tls: {}

  middlewares:
    server-stripprefix:
      stripPrefix:
        prefixes:
          - "/api"

  services:
    client:
      loadBalancer:
        servers:
          - url: "http://client:80"
    server:
      loadBalancer:
        servers:
          - url: "http://server:3000"