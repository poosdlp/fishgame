http:
  routers:
    client-http:
      rule: "PathPrefix(`/`)"
      service: client
      entrypoints:
        - web
      middlewares:
        - redirect-to-https

    server-http:
      rule: "PathPrefix(`/api`)"
      service: server
      entrypoints:
        - web
      middlewares:
        - redirect-to-https

    client-https:
      rule: "PathPrefix(`/`)"
      service: client
      entrypoints:
        - websecure
      tls: {}

    server-https:
      rule: "PathPrefix(`/api`)"
      service: server
      entrypoints:
        - websecure
      middlewares:
        - server-stripprefix
      tls: {}

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    server-stripprefix:
      stripPrefix:
        prefixes:
          - "/api"

  services:
    client:
      loadBalancer:
        servers:
          - url: "http://client:80"
    server:
      loadBalancer:
        servers:
          - url: "http://server:3000"