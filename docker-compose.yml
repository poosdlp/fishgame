services:
  client:
    build:
      context: ./client
      target: devel
    depends_on:
      - server
    restart: unless-stopped
    ports:
      - "8888:5173"
    volumes:
      - ./client:/app:z
      - /app/node_modules
    networks:
      - frontnet

  server:
    build:
      context: ./server
      target: devel
    depends_on:
      - database
    restart: unless-stopped
    ports:
      - "5555:3000"
    volumes:
      - ./server:/app:z
      - /app/node_modules
    networks:
      - backnet
      - frontnet

  database:
    image: mongo:8.2.5
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - backnet

volumes:
  mongo-data:

networks:
  backnet:
  frontnet: